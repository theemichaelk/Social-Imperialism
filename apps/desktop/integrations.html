<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Integrations — Social Imperialism</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="sidebar-nav.css">
<link rel="stylesheet" href="futuristic-shell.css">
<link rel="stylesheet" href="grok-integrate.css">
</head>
<body class="app-shell">
<aside id="app-sidebar"></aside>
<main class="main-content" style="padding:1.5rem 2rem;">
  <div id="neoPageHeader" class="neo-page-header"></div>
  <div id="neoToast" class="neo-toast" style="display:none"></div>
  <div class="neo-card">
    <h3><i class="fas fa-satellite-dish"></i> Live Connection Probes</h3>
    <button class="neo-btn primary" onclick="testConnections()">Test All Connections</button>
    <div id="probeGrid" style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>
  <div class="neo-grid">
    <div class="neo-card">
      <h3><i class="fas fa-envelope"></i> Email Marketing & SMTP</h3>
      <p style="font-size:0.8rem;color:#8ba3c7;margin:0 0 10px">Acumbamail, Amazon SES, VBout, MailChimp</p>
      <div id="emailStatus"></div>
      <a href="settings.html" class="neo-btn" style="margin-top:10px;text-decoration:none;display:inline-block">Edit API Keys</a>
    </div>
    <div class="neo-card">
      <h3><i class="fas fa-link"></i> URL Shortener</h3>
      <input class="neo-input" id="shortUrl" placeholder="https://example.com/page">
      <button class="neo-btn" style="margin-top:8px" onclick="shortenUrl()">Shorten with TinyURL</button>
      <p id="shortResult" style="font-size:0.85rem;color:#38bdf8;margin-top:8px"></p>
    </div>
    <div class="neo-card">
      <h3><i class="fas fa-cloud"></i> AWS & Storage</h3>
      <div id="awsStatus" style="font-size:0.82rem;color:#8ba3c7">Checking…</div>
    </div>
    <div class="neo-card">
      <h3><i class="fas fa-robot"></i> AI Providers</h3>
      <div id="aiStatus" style="font-size:0.82rem;color:#8ba3c7">Checking…</div>
    </div>
  </div>
  <div class="neo-card">
    <h3><i class="fas fa-broadcast-tower"></i> Email Auto-Reply Campaigns</h3>
    <p style="font-size:0.8rem;color:#8ba3c7;margin:0 0 10px">Triggered alerts for AI replies, leads, and Q&amp;A — parity with web Integrations → Email Campaigns.</p>
    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:#8ba3c7;margin-bottom:8px;">
      <input type="checkbox" id="emailCampaignsEnabled" style="width:auto;"> Enable email auto-reply system
    </label>
    <input class="neo-input" id="emailAlertRecipient" placeholder="Alert / test recipient email">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
      <button class="neo-btn" onclick="loadCampaigns()">Refresh Campaigns</button>
      <button class="neo-btn primary" onclick="saveEmailCampaignSettings()">Save Settings</button>
      <button class="neo-btn" onclick="sendTestCampaign()">Send Test Campaign</button>
    </div>
    <div id="campaignList" style="margin-top:10px;font-size:0.85rem;color:#8ba3c7"></div>
  </div>
</main>
<script src="sidebar-nav.js"></script>
<script src="desktop-page-kit.js"></script>
<script src="grok-integrate.js"></script>
<script>
const { ipcRenderer } = require('electron');

async function testConnections() {
  showToast('Running live probes…');
  const res = await ipcRenderer.invoke('test-email-connections');
  const metrics = res.apiMetrics || {};
  document.getElementById('probeGrid').innerHTML = Object.entries(metrics).map(([k, v]) => {
    const cls = v === 'Connected' ? 'ok' : v.includes('Auth failed') ? 'warn' : '';
    return `<span class="neo-pill ${cls}">${escapeHtml(k)}: ${escapeHtml(v)}</span>`;
  }).join('');
  document.getElementById('emailStatus').innerHTML = `
    <span class="neo-pill ${res.acumbamail?.ok ? 'ok' : 'warn'}">Acumbamail ${res.acumbamail?.ok ? 'Connected' : (res.acumbamail?.error || 'Pending')}</span>
    <span class="neo-pill ${res.ses?.ok ? 'ok' : ''}">SES ${res.ses?.ok ? 'Connected' : '—'}</span>
    <span class="neo-pill ${res.vbout?.ok ? 'ok' : ''}">VBout ${res.vbout?.ok ? 'Connected' : '—'}</span>
    <span class="neo-pill ${res.mailchimp?.ok ? 'ok' : ''}">MailChimp ${res.mailchimp?.ok ? 'Connected' : '—'}</span>
  `;
  showToast(res.success ? 'Connections probed' : 'Some providers need configuration');
}

async function shortenUrl() {
  const url = document.getElementById('shortUrl').value.trim();
  if (!url) return;
  const res = await ipcRenderer.invoke('shorten-url', url);
  document.getElementById('shortResult').textContent = res.shortUrl || res.error || 'Failed';
}

let emailCampaignState = { campaigns: [], settings: {} };

async function loadCampaigns() {
  const res = await ipcRenderer.invoke('get-email-campaigns');
  emailCampaignState = res || { campaigns: [], settings: {} };
  const camps = res.campaigns || [];
  const enabledEl = document.getElementById('emailCampaignsEnabled');
  const recipEl = document.getElementById('emailAlertRecipient');
  if (enabledEl) enabledEl.checked = res.settings?.enabled !== false;
  if (recipEl) recipEl.value = res.settings?.alertEmail || '';
  document.getElementById('campaignList').innerHTML = camps.map((c) =>
    `<div style="margin-bottom:8px;padding:8px;border:1px solid #334155;border-radius:6px;">
      <strong>${escapeHtml(c.name)}</strong>
      <div style="font-size:0.75rem;color:#64748b;margin:4px 0;">${escapeHtml(c.trigger)} · ${escapeHtml((c.subject || '').slice(0, 60))}</div>
      <label style="font-size:0.75rem;margin-right:12px;"><input type="checkbox" data-camp-enabled="${c.id}" ${c.enabled ? 'checked' : ''} onchange="toggleEmailCampaign('${c.id}','enabled',this.checked)"> On</label>
      <label style="font-size:0.75rem;"><input type="checkbox" data-camp-auto="${c.id}" ${c.autoReply ? 'checked' : ''} onchange="toggleEmailCampaign('${c.id}','autoReply',this.checked)"> Auto-reply</label>
    </div>`
  ).join('') || 'No campaigns configured — they seed from your active brand on first load.';
}

async function saveEmailCampaignSettings() {
  const settings = {
    ...emailCampaignState.settings,
    enabled: document.getElementById('emailCampaignsEnabled')?.checked !== false,
    alertEmail: document.getElementById('emailAlertRecipient')?.value?.trim() || emailCampaignState.settings?.alertEmail,
  };
  await ipcRenderer.invoke('save-email-campaigns', { ...emailCampaignState, settings });
  showToast('Email campaign settings saved', 'success');
  await loadCampaigns();
}

async function toggleEmailCampaign(id, field, value) {
  const campaigns = (emailCampaignState.campaigns || []).map((c) => (c.id === id ? { ...c, [field]: value } : c));
  emailCampaignState = { ...emailCampaignState, campaigns };
  await ipcRenderer.invoke('save-email-campaigns', emailCampaignState);
}

async function sendTestCampaign() {
  const camp = (emailCampaignState.campaigns || [])[0];
  if (!camp) return showToast('No campaigns loaded', 'error');
  const to = document.getElementById('emailAlertRecipient')?.value?.trim();
  const res = await ipcRenderer.invoke('send-email-campaign', { campaignId: camp.id, to: to || undefined });
  showToast(res.success !== false ? 'Test campaign sent' : (res.error || 'Send failed'), res.success !== false ? 'success' : 'error');
}

async function loadHealth() {
  const health = await ipcRenderer.invoke('get-page-health').catch(() => ({}));
  document.getElementById('awsStatus').innerHTML = health.s3
    ? `<span class="neo-pill ok">S3 ${escapeHtml(health.s3.bucket || 'configured')}</span>`
    : '<span class="neo-pill warn">S3 not configured</span>';
  document.getElementById('aiStatus').innerHTML = `
    <span class="neo-pill ${health.grok ? 'ok' : ''}">Grok ${health.grok ? 'Ready' : 'Configure in Settings'}</span>
    <span class="neo-pill ok">IPC ${Object.keys(health.channels || {}).length || '180+'} channels</span>
  `;
}

document.addEventListener('DOMContentLoaded', () => {
  mountNeoPage({
    pageId: 'integrations',
    eyebrow: 'System',
    title: 'Integrations Hub',
    subtitle: 'Connections, live probes, email providers, URL shortening, and campaign auto-reply — matches live SaaS.',
  });
  testConnections();
  loadHealth();
  loadCampaigns();
});
</script>
</body>
</html>
