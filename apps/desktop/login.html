<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Social Imperialism - Login</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  background-color: #020617; 
  color: #f8fafc; 
  margin: 0; 
  padding: 0; 
  display: flex; 
  height: 100vh;
  background: radial-gradient(circle at center, #0f172a, #020617);
  overflow: hidden;
}

/* Background Animated Grid / Particles Simulation */
.bg-grid {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
}

.glow-orb {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
  border-radius: 50%;
  top: 20%;
  left: 20%;
  z-index: 0;
  animation: float 10s infinite ease-in-out alternate;
}

.glow-orb-2 {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
  border-radius: 50%;
  bottom: -10%;
  right: 10%;
  z-index: 0;
  animation: float 12s infinite ease-in-out alternate-reverse;
}

@keyframes float {
  0% { transform: translateY(0px) scale(1); }
  100% { transform: translateY(-50px) scale(1.1); }
}

.container {
  display: flex;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Left Side - Global Intel / Charts */
.left-panel {
  flex: 1.2;
  padding: 3rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-right: 1px solid rgba(51, 65, 85, 0.5);
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(10px);
}

.brand-title {
  font-size: 3rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
  color: #38bdf8;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
}

.brand-subtitle {
  font-size: 1.2rem;
  color: #94a3b8;
  margin-bottom: 3rem;
  font-weight: 300;
}

.chart-container {
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 2rem;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  height: 250px;
}

.stats-row {
  display: flex;
  gap: 1.5rem;
}

.mini-stat {
  flex: 1;
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
}

.stat-label {
  color: #94a3b8;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
}

.stat-val {
  font-size: 2rem;
  font-weight: bold;
  color: #f1f5f9;
}

.stat-trend {
  color: #34d399;
  font-size: 0.9rem;
  margin-top: 0.25rem;
}

/* Right Side - Login Form */
.right-panel {
  flex: 0.8;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
}

.login-box {
  width: 100%;
  max-width: 400px;
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(56, 189, 248, 0.3);
  border-radius: 16px;
  padding: 3rem 2.5rem;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(56, 189, 248, 0.05);
}

.login-header {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  text-align: center;
  color: #f1f5f9;
}

.login-sub {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 2.5rem;
  font-size: 0.9rem;
}

.input-group {
  margin-bottom: 1.5rem;
  position: relative;
}

.input-group input {
  width: 100%;
  background: rgba(15, 23, 42, 0.8);
  border: 1px solid #475569;
  border-radius: 8px;
  padding: 1rem 1rem 1rem 3rem;
  color: #f8fafc;
  font-size: 1rem;
  box-sizing: border-box;
  transition: all 0.3s;
}

.input-group input:focus {
  outline: none;
  border-color: #38bdf8;
  box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
}

.input-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
}

button.btn-login {
  width: 100%;
  background: linear-gradient(135deg, #0ea5e9, #2563eb);
  color: white;
  border: none;
  padding: 1rem;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
  transition: all 0.2s;
  margin-top: 1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(37, 99, 235, 0.6);
}

.sys-status {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.8rem;
  color: #64748b;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.status-dot {
  width: 8px;
  height: 8px;
  background-color: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 10px #10b981;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; }
  50% { opacity: 1; box-shadow: 0 0 15px #10b981; }
  100% { opacity: 0.5; }
}

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow-orb"></div>
<div class="glow-orb-2"></div>

<div class="container">
  
  <div class="left-panel">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
      <img src="logo.png" alt="Logo" style="height: 60px; object-fit: contain;">
      <div class="brand-title" style="margin-bottom: 0;">Social Imperialism</div>
    </div>
    <div class="brand-subtitle">Global Automated Engagement Network v0.1</div>
    
    <div class="chart-container">
      <canvas id="networkChart"></canvas>
    </div>
    
    <div class="stats-row">
      <div class="mini-stat">
        <span class="stat-label">AI Queries Today</span>
        <span class="stat-val">14,209</span>
        <span class="stat-trend">↑ +12.4% vs yesterday</span>
      </div>
      <div class="mini-stat">
        <span class="stat-label">Active Deployments</span>
        <span class="stat-val">342</span>
        <span class="stat-trend" style="color: #38bdf8;">Systems Nominal</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="login-box">
      <div class="login-header">System Access</div>
      <div class="login-sub">Enter credentials to initialize AI Brain</div>
      
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" placeholder="Commander ID" value="Admin_Sigma_9" readonly>
      </div>
      
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" placeholder="Passcode" value="********" readonly>
      </div>
      
      <button class="btn-login" id="loginBtn">Initialize Link</button>
      
      <div class="sys-status">
        <div class="status-dot"></div>
        Neural Network Online & Linked
      </div>
    </div>
  </div>

</div>

<script>
  const { ipcRenderer } = require('electron');
  const ctx = document.getElementById('networkChart').getContext('2d');
  
  // Create a futuristic looking wave chart
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
      datasets: [
        {
          label: 'Global Processing Volume',
          data: [300, 450, 320, 800, 1200, 950, 600],
          borderColor: '#38bdf8',
          backgroundColor: 'rgba(56, 189, 248, 0.1)',
          borderWidth: 2,
          tension: 0.4,
          fill: true,
          pointBackgroundColor: '#0f172a',
          pointBorderColor: '#38bdf8',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: 'Predictive Routing',
          data: [250, 400, 300, 750, 1100, 850, 550],
          borderColor: 'rgba(16, 185, 129, 0.5)',
          borderWidth: 2,
          borderDash: [5, 5],
          tension: 0.4,
          fill: false,
          pointRadius: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        legend: {
          labels: { color: '#94a3b8', font: { family: '-apple-system' } }
        },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.9)',
          titleColor: '#38bdf8',
          bodyColor: '#f1f5f9',
          borderColor: '#334155',
          borderWidth: 1
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(51, 65, 85, 0.3)', drawBorder: false },
          ticks: { color: '#64748b' }
        },
        y: {
          grid: { color: 'rgba(51, 65, 85, 0.3)', drawBorder: false },
          ticks: { color: '#64748b' },
          beginAtZero: true
        }
      }
    }
  });

  document.getElementById('loginBtn').addEventListener('click', () => {
    const btn = document.getElementById('loginBtn');
    btn.innerText = "Linking...";
    btn.disabled = true;
    setTimeout(async () => {
      try {
        const status = await ipcRenderer.invoke('get-setup-status');
        if (status && !status.complete) {
          window.location.href = 'onboarding.html?step=' + (status.nextStep || 1);
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (e) {
        window.location.href = 'onboarding.html?step=1';
      }
    }, 800);
  });
</script>
</body>
</html>
