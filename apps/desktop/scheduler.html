<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=calendar.html#scheduler">
<title>Redirecting to Content Calendar</title>
<link rel="stylesheet" href="sidebar-nav.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
.main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
</style>
</head>
<body>
<div id="app-sidebar" class="sidebar app-sidebar"></div>
<script>
(() => {
  try {
    const { mountAppSidebar } = require('./sidebar-nav');
    mountAppSidebar('calendar', () => location.reload());
  } catch (e) { console.warn('Sidebar init:', e.message); }
})();
</script>


<div class="main-content">
  <p>Scheduler lives on <a href="calendar.html#scheduler" style="color:#38bdf8;">Content Calendar → Background Run Schedule</a>. Redirecting…</p>
</div>
<script>setTimeout(() => { window.location.href = 'calendar.html#scheduler'; }, 400);</script>
</body>
</html>
